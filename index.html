<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Miauguau">
    <title>Miauguau Control</title>
    <link rel="icon" href="/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <div class="header-titles">
          <h1>MIAUGUAU<span>CONTROL</span></h1>
          <p>Registro de alimentación</p>
        </div>
        <button id="settings-btn" class="settings-btn" aria-label="Ajustes">⚙️</button>
      </header>

      <main class="main-content">
        <!-- PET SELECTION -->
        <section class="selection-group">
          <h2>¿Quién ha comido?</h2>
          <div class="options-grid" id="pet-options">
            <button class="option-card" data-type="pet" data-value="pet1" id="pet1-btn">
              <span class="emoji">🐱</span>
              <span class="label" id="pet1-label">Gato</span>
            </button>
            <button class="option-card" data-type="pet" data-value="pet2" id="pet2-btn">
              <span class="emoji">🐶</span>
              <span class="label" id="pet2-label">Perro</span>
            </button>
          </div>
        </section>

        <!-- ACTION SELECTION -->
        <section class="selection-group hidden" id="action-section">
          <h2>¿Qué le has dado?</h2>
          
          <!-- Cat Options -->
          <div class="options-grid" id="cat-action-options" style="display: none;">
            <button class="option-card selected" data-type="action" data-value="Pienso">
              <span class="emoji">🥣</span>
              <span class="label">Pienso</span>
            </button>
            <button class="option-card" data-type="action" data-value="Comida Húmeda">
              <span class="emoji">🥫</span>
              <span class="label">Comida Húmeda</span>
            </button>
          </div>

          <!-- Dog Options -->
          <div class="options-grid grid-3" id="dog-action-options" style="display: none;">
            <button class="option-card selected" data-type="action" data-value="Comida">
              <span class="emoji">🍲</span>
              <span class="label">Comida</span>
            </button>
            <button class="option-card" data-type="action" data-value="Media Pastilla">
              <span class="emoji">💊</span>
              <span class="label">Media Pastilla</span>
            </button>
            <button class="option-card" data-type="action" data-value="Pastilla Entera">
              <span class="emoji">💊</span>
              <span class="label">Pastilla Entera</span>
            </button>
          </div>
        </section>

        <!-- PERSON SELECTION -->
        <section class="selection-group">
          <h2>¿Quién le dio?</h2>
          <div class="options-grid" id="person-options">
            <button class="option-card" data-type="person" data-value="person1" id="person1-btn">
              <span class="emoji">👩🏻</span>
              <span class="label" id="person1-label">Alba</span>
            </button>
            <button class="option-card" data-type="person" data-value="person2" id="person2-btn">
              <span class="emoji">👨🏻</span>
              <span class="label" id="person2-label">Santi</span>
            </button>
          </div>
        </section>

        <!-- DATE AND TIME SELECTION -->
        <section class="selection-group datetime-group">
          <h2>¿Cuándo? <span style="font-size: 14px; font-weight: 400; color: var(--text-secondary);">(Opcional)</span></h2>
          <div class="datetime-inputs">
            <input type="date" id="custom-date" class="custom-input">
            <input type="time" id="custom-time" class="custom-input">
          </div>
        </section>

        <!-- SUBMIT BUTTON -->
        <div class="action-container">
          <button id="submit-btn" class="submit-btn" disabled>
            Registrar Comida
          </button>
        </div>

        <!-- HISTORY SECTION -->
        <section class="history-section">
          <div class="history-header">
            <h2>Últimas Comidas</h2>
            <button id="clear-btn" class="clear-btn">Borrar</button>
          </div>
          <ul id="history-list" class="history-list">
            <!-- Records will be injected here via JS -->
          </ul>
        </section>
      </main>

      <!-- SETTINGS MODAL -->
      <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
          <h2>Ajustes</h2>
          <div class="settings-form">
            <div class="form-group">
              <label for="pet1-input">Mascota 1 (🐱)</label>
              <input type="text" id="pet1-input" class="custom-input" placeholder="Gato">
            </div>
            <div class="form-group">
              <label for="pet2-input">Mascota 2 (🐶)</label>
              <input type="text" id="pet2-input" class="custom-input" placeholder="Perro">
            </div>
            <div class="form-group">
              <label for="person1-input">Persona 1 (👩🏻)</label>
              <input type="text" id="person1-input" class="custom-input" placeholder="Alba">
            </div>
            <div class="form-group">
              <label for="person2-input">Persona 2 (👨🏻)</label>
              <input type="text" id="person2-input" class="custom-input" placeholder="Santi">
            </div>
          </div>
          <div class="modal-actions">
            <button id="close-settings-btn" class="secondary-btn">Cancelar</button>
            <button id="save-settings-btn" class="primary-btn">Guardar</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
